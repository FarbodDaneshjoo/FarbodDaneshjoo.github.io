name: Update AI Profile Summary


on:

  schedule:

    - cron: "0 0 * * *"


  workflow_dispatch:





jobs:


  update:


    runs-on: ubuntu-latest



    permissions:

      contents: write



    steps:


    - name:
      Checkout repository


      uses:
        actions/checkout@v4




    - name:
      Setup Python


      uses:
        actions/setup-python@v5


      with:

        python-version: "3.11"




    - name:
      Install dependencies


      run:


        pip install requests






    - name:
      Generate AI Summary


      env:


        GITHUB_TOKEN:
          ${{ secrets.GITHUB_TOKEN }}


        OPENAI_API_KEY:
          ${{ secrets.OPENAI_API_KEY }}



      run:


        python scripts/generate_summary.py







    - name:
      Save changes



      run:


        git config user.name "github-actions"


        git config user.email "github-actions@github.com"


        git add data/ai-summary.json


        git commit -m "Update AI summary"

          || echo "No changes"



        git push
